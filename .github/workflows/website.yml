# Build with eigen and deploy to GitHub Pages
name: Website

on:
  push:
    branches: ["master"]
    paths:
      - 'website/**'
      - '.github/workflows/website.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # Doc code examples contain ${VAR} references — set each to its own
      # name so eigen's interpolation is a no-op.
      NOTION_DB_ID: ${NOTION_DB_ID}
      NOTION_API_KEY: ${NOTION_API_KEY}
      ENV_VAR: ${ENV_VAR}
      API_TOKEN: ${API_TOKEN}
      WORKSPACE_ID: ${WORKSPACE_ID}
      CMS_TOKEN: ${CMS_TOKEN}
      STRAPI_TOKEN: ${STRAPI_TOKEN}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with eigen
        uses: ./github-action
        with:
          source: './website'
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'website/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
