[site]
name = "eigen"
base_url = "https://eigen.wavefunk.io"

[site.seo]
title = "eigen | static site generator with htmx fragment navigation"
description = "Rust-powered static site generator where every template block becomes an htmx fragment. Auto-generated SEO tags, sitemaps, and JSON-LD. Zero client JavaScript."
og_type = "website"

[site.schema]
default_types = ["BreadcrumbList"]

[build]
fragments = true
fragment_dir = "_fragments"
content_block = "content"
minify = true
clean_urls = false
clean_links = true
oob_blocks = ["sidebar"]
not_found = true

[build.critical_css]
enabled = true
max_inline_size = 50000
preload_full = true

[build.hints]
enabled = true
auto_detect_hero = true
prefetch_links = true
max_prefetch = 5

[build.content_hash]
enabled = true
exclude = ["css/wavefunk/**"]

[build.bundling]
enabled = true
css = true
js = true
tree_shake_css = true

[build.view_transitions]
enabled = true

[sitemap]
enabled = true
clean_urls = false

[robots]
enabled = true
sitemap = true

[[robots.rules]]
user_agent = "*"
allow = ["/"]

