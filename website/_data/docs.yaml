# Optimization

- title: "Async Build Pipeline"
  slug: async-build
  category: Optimization
  description: "Eigen's build pipeline runs asynchronously on the tokio runtime, enabling concurrent page rendering and overlapping HTTP requests."
  content_file: "docs/async_build.md"

- title: "Incremental Builds"
  slug: incremental-builds
  category: Optimization
  description: "Eigen supports incremental builds that skip re-rendering pages whose inputs are unchanged."
  content_file: "docs/incremental_builds.md"

- title: "Content Hashing for Static Assets"
  slug: content-hashing
  category: Optimization
  description: "Content hashing fingerprints static assets with SHA-256 hashes for cache busting."
  content_file: "docs/content_hashing.md"

- title: "Critical CSS Inlining"
  slug: critical-css
  category: Optimization
  description: "Critical CSS inlining extracts the subset of CSS rules actually used on each page, inlines them in a style block in head, and defers the full stylesheet load."
  content_file: "docs/critical_css.md"

- title: "CSS/JS Bundling and Tree-Shaking"
  slug: css-js-bundling
  category: Optimization
  description: "CSS/JS bundling merges multiple CSS and JS files into single bundled files, reduces HTTP requests, and removes unused CSS selectors via tree-shaking."
  content_file: "docs/css_js_bundling.md"

- title: "Lazy Loading for Below-Fold Images"
  slug: lazy-loading
  category: Optimization
  description: "Eigen automatically adds loading=lazy and decoding=async to below-fold img tags during the build, improving page load performance without any configuration."
  content_file: "docs/lazy_loading.md"

- title: "Preload / Prefetch Resource Hints"
  slug: preload-prefetch
  category: Optimization
  description: "Eigen automatically injects link resource hints into head to improve page load performance."
  content_file: "docs/preload_prefetch.md"

