<header class="nav">
  <div class="nav-inner">
    <a {{ link_to("/index.html") }} class="nav-logo">eigen</a>
    <button class="nav-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links">
      {% for item in nav %}
      <li>
        {% if item.external %}
        <a href="{{ item.url }}" target="_blank" rel="noopener">{{ item.label }}</a>
        {% else %}
        <a {{ link_to(item.url) }}>{{ item.label }}</a>
        {% endif %}
      </li>
      {% endfor %}
    </ul>
  </div>
</header>
